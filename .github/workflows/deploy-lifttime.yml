name: Deploy LiftTime

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-lifttime-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Validate LiftTime
        run: |
          set -e

          echo "Navigating to project..."
          cd /home/cesar/docker/lifttime

          echo "Pulling latest code..."
          git pull origin main

          echo "Validating Docker Compose..."
          docker compose config > /dev/null

          echo "Testing Docker build..."
          docker compose build

          echo "Validation successful - test run"

  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
    needs: validate

    steps:
      - name: Deploy LiftTime
        run: |
          set -e

          echo "Navigating to project..."
          cd /home/cesar/docker/lifttime

          echo "Pulling latest code..."
          git pull origin main

          echo "Rebuilding and starting containers..."
          docker compose up -d --build

          echo "Deployment complete"
