name: Deploy LiftTime

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-lifttime-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate LiftTime
        run: |
          set -e

          echo "Validating Docker Compose..."
          docker compose --env-file /home/cesar/docker/lifttime/.env config > /dev/null

          echo "Testing Docker build..."
          docker compose --env-file /home/cesar/docker/lifttime/.env build

          echo "Validation successful"

  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
    needs: validate

    steps:
      - name: Deploy LiftTime
        run: |
          set -e

          echo "Navigating to project..."
          cd /home/cesar/docker/lifttime

          echo "Deploying exact workflow commit..."
          git fetch origin
          git reset --hard $GITHUB_SHA

          echo "Starting containers..."
          docker compose up -d

          echo "Waiting for app to be ready..."
          max_attempts=10
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "[health-check] Attempt $attempt/$max_attempts"

            if curl -f http://localhost:3012/en > /dev/null; then
              echo "[health-check] SUCCESS on attempt $attempt"
              break
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "[health-check] FAILED after $max_attempts attempts"
              exit 1
            fi

            echo "[health-check] App not ready yet, retrying in 2 seconds..."
            sleep 2
            attempt=$((attempt + 1))
          done

          echo "[health-check] Deployment verified"
