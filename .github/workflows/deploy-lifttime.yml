name: Deploy LiftTime

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-lifttime-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Deploy LiftTime
        run: |
          cd /home/cesar/docker/lifttime
          git pull origin main
          docker compose up -d --build
